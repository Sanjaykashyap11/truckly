<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:'Google Sans',Roboto,Arial,sans-serif">

  <!-- Background -->
  <rect width="900" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#202124">Trucky — System Architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#5f6368">Built on Google Cloud · Gemini 2.5 Flash Native Audio · Samsara ELD</text>

  <!-- ─── COLUMN 1: Clients ─── -->
  <!-- Dispatcher box -->
  <rect x="30" y="90" width="160" height="76" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="110" y="115" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Dispatcher TMS</text>
  <text x="110" y="132" text-anchor="middle" font-size="10" fill="#3c4043">Next.js 15 · Web Audio API</text>
  <text x="110" y="148" text-anchor="middle" font-size="10" fill="#3c4043">Vercel · trucky-ai.vercel.app</text>

  <!-- Driver box -->
  <rect x="30" y="196" width="160" height="76" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="110" y="221" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Driver Co-Pilot</text>
  <text x="110" y="238" text-anchor="middle" font-size="10" fill="#3c4043">Next.js 15 · Web Audio API</text>
  <text x="110" y="254" text-anchor="middle" font-size="10" fill="#3c4043">PCM16 · 16 kHz mic input</text>

  <!-- ─── COLUMN 2: GCP Backend ─── -->
  <!-- GCP container -->
  <rect x="245" y="72" width="390" height="384" rx="10" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="440" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#5f6368" letter-spacing="0.5">GOOGLE CLOUD PLATFORM</text>

  <!-- Cloud Run box -->
  <rect x="265" y="104" width="350" height="52" rx="8" fill="#fff8e1" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="440" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#e37400">Cloud Run · FastAPI Backend</text>
  <text x="440" y="143" text-anchor="middle" font-size="10" fill="#3c4043">Python 3.12 · uvicorn · WebSocket · timeout 3600s · 1 Gi RAM</text>

  <!-- Gemini Live box -->
  <rect x="265" y="180" width="160" height="80" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="345" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#1e8e3e">Gemini Live API</text>
  <text x="345" y="218" text-anchor="middle" font-size="10" fill="#3c4043">gemini-2.5-flash</text>
  <text x="345" y="233" text-anchor="middle" font-size="10" fill="#3c4043">native-audio-latest</text>
  <text x="345" y="248" text-anchor="middle" font-size="10" fill="#3c4043">Bidirectional · Native Audio</text>

  <!-- Tool Handlers box -->
  <rect x="455" y="180" width="160" height="80" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="1.5"/>
  <text x="535" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#c5221f">Tool Handlers</text>
  <text x="535" y="218" text-anchor="middle" font-size="10" fill="#3c4043">manage_load · plan_trip</text>
  <text x="535" y="233" text-anchor="middle" font-size="10" fill="#3c4043">check_hos · find_fuel</text>
  <text x="535" y="248" text-anchor="middle" font-size="10" fill="#3c4043">handle_breakdown · msg</text>

  <!-- Shared State box -->
  <rect x="265" y="284" width="160" height="64" rx="8" fill="#f3e8fd" stroke="#9334e6" stroke-width="1.5"/>
  <text x="345" y="306" text-anchor="middle" font-size="11" font-weight="600" fill="#7627bb">Shared State</text>
  <text x="345" y="322" text-anchor="middle" font-size="10" fill="#3c4043">LOADS · MESSAGES</text>
  <text x="345" y="338" text-anchor="middle" font-size="10" fill="#3c4043">broadcast() · state.py</text>

  <!-- Trip Planner box -->
  <rect x="455" y="284" width="160" height="64" rx="8" fill="#fff8e1" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="535" y="306" text-anchor="middle" font-size="11" font-weight="600" fill="#e37400">Trip Planner</text>
  <text x="535" y="322" text-anchor="middle" font-size="10" fill="#3c4043">FMCSA HOS routing</text>
  <text x="535" y="338" text-anchor="middle" font-size="10" fill="#3c4043">OSRM · Nominatim</text>

  <!-- Cloud Build box -->
  <rect x="265" y="372" width="350" height="44" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="440" y="391" text-anchor="middle" font-size="11" font-weight="600" fill="#1a73e8">Cloud Build — CI/CD (cloudbuild.yaml)</text>
  <text x="440" y="408" text-anchor="middle" font-size="10" fill="#3c4043">Docker → Container Registry → Cloud Run auto-deploy</text>

  <!-- ─── COLUMN 3: External APIs ─── -->
  <!-- Samsara box -->
  <rect x="695" y="140" width="170" height="80" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="780" y="162" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Samsara ELD API</text>
  <text x="780" y="178" text-anchor="middle" font-size="10" fill="#3c4043">49 live drivers · JY Carriers</text>
  <text x="780" y="194" text-anchor="middle" font-size="10" fill="#3c4043">GPS · HOS · fuel · engine</text>
  <text x="780" y="210" text-anchor="middle" font-size="10" fill="#3c4043">30s refresh · HTTPS</text>

  <!-- OSRM box -->
  <rect x="695" y="244" width="170" height="64" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="780" y="266" text-anchor="middle" font-size="12" font-weight="600" fill="#1e8e3e">OSRM + Nominatim</text>
  <text x="780" y="282" text-anchor="middle" font-size="10" fill="#3c4043">Truck routing (no API key)</text>
  <text x="780" y="298" text-anchor="middle" font-size="10" fill="#3c4043">HOS-aware waypoints</text>

  <!-- ─── ARROWS ─── -->

  <!-- Dispatcher ↔ Backend (WebSocket) -->
  <line x1="190" y1="120" x2="245" y2="138" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="245" y1="134" x2="190" y2="120" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="118" text-anchor="middle" font-size="9" fill="#4285f4">WSS</text>

  <!-- Driver ↔ Backend (PCM16) -->
  <line x1="190" y1="234" x2="245" y2="200" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="245" y1="204" x2="190" y2="238" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="226" text-anchor="middle" font-size="9" fill="#4285f4">PCM16</text>

  <!-- Cloud Run ↔ Gemini -->
  <line x1="345" y1="156" x2="345" y2="180" stroke="#34a853" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="355" y1="180" x2="355" y2="156" stroke="#34a853" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Gemini ↔ Tool Handlers -->
  <line x1="425" y1="220" x2="455" y2="220" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="455" y1="228" x2="425" y2="228" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="213" text-anchor="middle" font-size="9" fill="#ea4335">fn calls</text>

  <!-- Tool Handlers → Shared State -->
  <line x1="490" y1="260" x2="400" y2="284" stroke="#9334e6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Gemini → Shared State -->
  <line x1="345" y1="260" x2="345" y2="284" stroke="#9334e6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Tool Handlers → Trip Planner -->
  <line x1="535" y1="260" x2="535" y2="284" stroke="#e37400" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Backend → Samsara -->
  <line x1="615" y1="156" x2="695" y2="170" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="695" y1="178" x2="615" y2="164" stroke="#4285f4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Trip Planner → OSRM -->
  <line x1="615" y1="310" x2="695" y2="276" stroke="#34a853" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── Legend ─── -->
  <rect x="30" y="470" width="840" height="70" rx="8" fill="#f8f9fa" stroke="#dadce0" stroke-width="1"/>
  <text x="50" y="490" font-size="10" font-weight="600" fill="#5f6368">GOOGLE SERVICES USED</text>
  <rect x="50" y="500" width="10" height="10" rx="2" fill="#fbbc04"/>
  <text x="66" y="510" font-size="10" fill="#3c4043">Cloud Run (backend hosting)</text>
  <rect x="210" y="500" width="10" height="10" rx="2" fill="#4285f4"/>
  <text x="226" y="510" font-size="10" fill="#3c4043">Cloud Build (CI/CD)</text>
  <rect x="360" y="500" width="10" height="10" rx="2" fill="#34a853"/>
  <text x="376" y="510" font-size="10" fill="#3c4043">Gemini 2.5 Flash Native Audio (Live API)</text>
  <rect x="590" y="500" width="10" height="10" rx="2" fill="#9334e6"/>
  <text x="606" y="510" font-size="10" fill="#3c4043">Container Registry</text>
  <rect x="730" y="500" width="10" height="10" rx="2" fill="#ea4335"/>
  <text x="746" y="510" font-size="10" fill="#3c4043">Vertex AI (auth fallback)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
</svg>
